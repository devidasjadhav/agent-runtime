name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build linux/amd64
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
          REF_NAME: ${{ github.ref_name }}
        run: |
          go build -ldflags="-s -w -X main.version=${REF_NAME}" \
            -o agent-runtime-linux-amd64 ./cmd/demo

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-runtime-linux-amd64
          path: agent-runtime-linux-amd64
          retention-days: 14

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
          REF_NAME: ${{ github.ref_name }}
        run: |
          go build -ldflags="-s -w -X main.version=${REF_NAME}" \
            -o agent-runtime-linux-amd64 ./cmd/demo

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: agent-runtime-linux-amd64
          generate_release_notes: true
